<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REC Hive – Student Login</title>
  <link rel="stylesheet" href="/REC-Hive/frontend/css/shared.css" />
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="home.html">REC Hive</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div style="width:100%;max-width:440px;">
      <div class="auth-card">
        <div style="font-size:2.5rem;margin-bottom:14px;">👋</div>
        <h1>Login</h1>
        <p class="auth-subtitle">Sign in to order from campus shops.</p>

        <div class="field">
          <label>Username</label>
          <input id="username" placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <button class="btn-primary" onclick="login()" id="loginBtn" style="width:100%;margin-top:4px;padding:13px;">
          Sign In
        </button>
        <p style="text-align:center;margin-top:18px;" class="muted">
          No account? <a href="register.html" style="color:var(--ink);font-weight:500;">Register here</a>
        </p>
        <hr class="divider" />
        <p style="text-align:center;" class="muted">
          Are you a shopkeeper? <a href="shop-login.html" style="color:var(--ink);font-weight:500;">Shop login →</a>
        </p>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="/frontend/js/api.js"></script>
  <script>
    function showMessage(msg, type) {
      const toast = document.getElementById("toast");
      const el = document.createElement("div");
      el.className = `toast-msg ${type}`;
      el.textContent = msg;
      toast.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function login() {
      const btn = document.getElementById("loginBtn");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      try {
        const data = await apiFetch("/api/login/", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        }, null);
        localStorage.setItem("token", data.token);
        showMessage("Logged in successfully", "success");
        const next = new URLSearchParams(window.location.search).get("next") || "home.html";
        setTimeout(() => { location.href = next; }, 500);
      } catch (e) {
        showMessage(e.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }

    document.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
