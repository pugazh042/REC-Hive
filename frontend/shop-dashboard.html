<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REC Hive – Shop Dashboard</title>
  <link rel="stylesheet" href="/frontend/css/shared.css" />
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="shop-dashboard.html">REC Hive <span class="seller-badge">Seller</span></a>
      <ul class="nav-links">
        <li><a class="active" href="shop-dashboard.html">Dashboard</a></li>
        <li><a href="shop-orders.html">Orders</a></li>
        <li><a href="shop-products.html">Products</a></li>
        <li><a href="shop-settings.html">Settings</a></li>
      </ul>
      <div class="nav-right">
        <button class="btn-outline" onclick="logout()" style="font-size:0.8125rem;">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <p class="label" style="margin-bottom:6px;">Seller Dashboard</p>
      <h1 id="shopName">Loading…</h1>
      <p>Manage orders, products and stock.</p>
    </div>

    <div id="alerts" style="margin-bottom:20px;display:grid;gap:8px;"></div>

    <div id="stats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px;"></div>

    <div class="card">
      <div class="section-header" style="margin-bottom:0;">
        <div>
          <h2 style="margin-bottom:4px;">Order Management</h2>
          <p class="muted">Manage and view all orders from a dedicated section.</p>
        </div>
        <a class="btn-primary" href="shop-orders.html" style="font-size:0.8125rem;padding:9px 14px;">Open Orders →</a>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script src="/frontend/js/api.js"></script>
  <script>
    function showMessage(msg, type) {
      const toast = document.getElementById("toast");
      const el = document.createElement("div");
      el.className = `toast-msg ${type}`;
      el.textContent = msg;
      toast.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function logout() { clearToken("shopToken"); location.href = "shop-login.html"; }

    async function updateOrderStatus(orderId, status) {
      try {
        await apiFetch("/shop/update-order-status", {
          method: "POST",
          body: JSON.stringify({ order_id: orderId, status }),
        }, "shopToken");
        showMessage("Status updated", "success");
        loadShopOrders();
      } catch (e) { showMessage(e.message, "error"); }
    }

    async function loadShopOrders() {
      try {
        if (!requireShopAuth("shop-login.html")) return;
        const dashboard = await apiFetch("/shop/dashboard", {}, "shopToken");
        document.getElementById("shopName").textContent = `${dashboard.shop.name}`;

        document.getElementById("stats").innerHTML = `
          <div class="stat-card">
            <div class="stat-val">${dashboard.stats.pending_orders}</div>
            <div class="stat-label">Pending Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${dashboard.stats.completed_orders}</div>
            <div class="stat-label">Completed Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="color:${dashboard.stats.low_stock_items > 0 ? 'var(--danger)' : 'var(--success)'};">${dashboard.stats.low_stock_items}</div>
            <div class="stat-label">Low Stock Alerts</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">₹${dashboard.stats.total_revenue}</div>
            <div class="stat-label">Total Revenue</div>
          </div>
        `;

        const alerts = [];
        if (dashboard.stats.pending_orders > 0)
          alerts.push(`<div class="alert alert-warning">⚠️ ${dashboard.stats.pending_orders} pending order(s) require action.</div>`);
        if (dashboard.stats.low_stock_items > 0)
          alerts.push(`<div class="alert alert-danger">🔴 ${dashboard.stats.low_stock_items} product(s) are running low on stock.</div>`);
        document.getElementById("alerts").innerHTML = alerts.join("");

      } catch (e) {
        showMessage(e.message, "error");
      }
    }

    loadShopOrders();
    setInterval(loadShopOrders, 20000);
  </script>
</body>
</html>
