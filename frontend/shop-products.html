<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REC Hive – Shop Products</title>
  <link rel="stylesheet" href="/frontend/css/shared.css" />
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="shop-dashboard.html">REC Hive <span class="seller-badge">Seller</span></a>
      <ul class="nav-links">
        <li><a href="shop-dashboard.html">Dashboard</a></li>
        <li><a href="shop-orders.html">Orders</a></li>
        <li><a class="active" href="shop-products.html">Products</a></li>
        <li><a href="shop-settings.html">Settings</a></li>
      </ul>
      <div class="nav-right">
        <button class="btn-outline" onclick="logout()" style="font-size:0.8125rem;">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <button class="btn-outline back-btn" onclick="goBackOrHome('shop-dashboard.html')">Dashboard</button>
    <div class="page-header">
      <h1>Manage Products</h1>
      <p>Add, update, and remove products from your shop.</p>
    </div>

    <div style="display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;">
      <!-- Add Product Form -->
      <div class="card" style="position:sticky;top:calc(var(--nav-h) + 20px);">
        <h3 style="margin-bottom:16px;">Add New Product</h3>
        <div class="field"><label>Product Name</label><input id="name" placeholder="e.g. Veg Burger" /></div>
        <div class="field"><label>Description</label><textarea id="description" placeholder="Short description…" style="min-height:70px;"></textarea></div>
        <div class="field"><label>Image URL</label><input id="image_url" placeholder="https://…" /></div>
        <div class="field">
          <label>Product Type</label>
          <select id="product_type">
            <option value="food">🍔 Food (prepared on order)</option>
            <option value="packed">📦 Packed (ready to pick)</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="field"><label>Price (₹)</label><input id="price" type="number" min="1" placeholder="0" /></div>
          <div class="field"><label>Stock</label><input id="stock" type="number" min="0" placeholder="0" /></div>
        </div>
        <div class="field"><label>Category ID</label><input id="category_id" type="number" min="1" placeholder="1" /></div>
        <button class="btn-primary" onclick="createProduct()" style="width:100%;padding:12px;">
          + Add Product
        </button>
      </div>

      <!-- Product List -->
      <div>
        <div class="section-header">
          <h2>Your Products</h2>
          <button onclick="loadProducts()" class="btn-outline" style="font-size:0.8125rem;padding:7px 14px;">↻ Refresh</button>
        </div>
        <div id="productList" style="display:grid;gap:10px;"></div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script src="/frontend/js/api.js"></script>
  <script>
    function showMessage(msg, type) {
      const toast = document.getElementById("toast");
      const el = document.createElement("div");
      el.className = `toast-msg ${type}`;
      el.textContent = msg;
      toast.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function logout() { clearToken("shopToken"); location.href = "shop-login.html"; }

    function productEditor(p) {
      return `
        <div id="edit-${p.id}" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="field" style="margin-bottom:8px;">
            <label>Name</label>
            <input id="e-name-${p.id}" value="${(p.name || "").replace(/"/g, "&quot;")}" />
          </div>
          <div class="field" style="margin-bottom:8px;">
            <label>Description</label>
            <textarea id="e-description-${p.id}" style="min-height:60px;">${p.description || ""}</textarea>
          </div>
          <div class="field" style="margin-bottom:8px;">
            <label>Image URL</label>
            <input id="e-image-${p.id}" value="${(p.image_url || "").replace(/"/g, "&quot;")}" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div class="field" style="margin-bottom:8px;">
              <label>Price</label>
              <input id="e-price-${p.id}" type="number" min="1" value="${p.price}" />
            </div>
            <div class="field" style="margin-bottom:8px;">
              <label>Stock</label>
              <input id="e-stock-${p.id}" type="number" min="0" value="${p.stock}" />
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div class="field" style="margin-bottom:8px;">
              <label>Type</label>
              <select id="e-type-${p.id}">
                <option value="food" ${p.product_type === "food" ? "selected" : ""}>Food</option>
                <option value="packed" ${p.product_type === "packed" ? "selected" : ""}>Packed</option>
              </select>
            </div>
            <div class="field" style="margin-bottom:8px;">
              <label>Category ID</label>
              <input id="e-category-${p.id}" type="number" min="1" value="${p.current_category_id || ""}" />
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn-primary" onclick="saveProduct(${p.id})" style="font-size:0.8rem;padding:7px 14px;">Save Changes</button>
            <button class="btn-outline" onclick="toggleEdit(${p.id})" style="font-size:0.8rem;padding:7px 14px;">Cancel</button>
          </div>
        </div>
      `;
    }

    async function loadProducts() {
      if (!requireShopAuth("shop-login.html")) return;
      const items = await apiFetch("/shop/products", {}, "shopToken");
      if (!items.length) {
        document.getElementById("productList").innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <p>No products yet. Add one using the form.</p>
          </div>`;
        return;
      }
      document.getElementById("productList").innerHTML = items.map((p) => `
        <article class="card" style="display:flex;align-items:center;gap:14px;">
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" style="width:60px;height:60px;object-fit:cover;border-radius:var(--radius-sm);flex-shrink:0;" onerror="this.style.display='none'" />` : `<div style="width:60px;height:60px;border-radius:var(--radius-sm);background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">${p.product_type === 'food' ? '🍔' : '📦'}</div>`}
          <div style="flex:1;min-width:0;">
            <h3 style="margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</h3>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <span class="badge badge-gray">${p.product_type}</span>
              <span class="badge badge-hive">${p.category_name}</span>
              <span class="muted" style="font-size:0.8rem;">Stock: ${p.stock}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:var(--font-display);font-size:1.125rem;font-weight:700;margin-bottom:6px;">₹${p.price}</div>
            <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-bottom:6px;">
              <input id="quick-stock-${p.id}" type="number" min="0" value="${p.stock}" style="width:84px;padding:6px 8px;" />
              <button class="btn-outline" onclick="updateStock(${p.id})" style="font-size:0.75rem;padding:6px 10px;">Update Stock</button>
            </div>
            <div style="display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;">
              <button class="btn-outline" onclick="increaseStock(${p.id})" style="font-size:0.75rem;padding:6px 10px;">+ Stock</button>
              <button class="btn-outline" onclick="toggleEdit(${p.id})" style="font-size:0.75rem;padding:6px 10px;">Edit</button>
              <button class="btn-outline" onclick="deleteProduct(${p.id})" style="font-size:0.75rem;padding:6px 12px;color:var(--danger);border-color:var(--danger);">Remove</button>
            </div>
          </div>
          ${productEditor(p)}
        </article>
      `).join("");
    }

    async function createProduct() {
      try {
        if (!requireShopAuth("shop-login.html")) return;
        const payload = {
          name: document.getElementById("name").value.trim(),
          description: document.getElementById("description").value.trim(),
          image_url: document.getElementById("image_url").value.trim(),
          product_type: document.getElementById("product_type").value,
          price: Number(document.getElementById("price").value),
          stock: Number(document.getElementById("stock").value),
          category_id: Number(document.getElementById("category_id").value),
          is_active: true,
        };
        if (!payload.name || !payload.category_id || payload.price <= 0 || payload.stock < 0) {
          showMessage("Enter valid name, category ID, price, and stock", "error");
          return;
        }
        await apiFetch("/shop/products", {
          method: "POST",
          body: JSON.stringify(payload),
        }, "shopToken");
        showMessage("Product added!", "success");
        ["name","description","image_url","price","stock"].forEach(id => document.getElementById(id).value = "");
        loadProducts();
      } catch (e) { showMessage(e.message, "error"); }
    }

    function toggleEdit(id) {
      const box = document.getElementById(`edit-${id}`);
      if (!box) return;
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    async function increaseStock(id) {
      const qty = Number(prompt("Increase stock by:", "1"));
      if (!Number.isFinite(qty) || qty <= 0) return;
      try {
        const products = await apiFetch("/shop/products", {}, "shopToken");
        const item = products.find((p) => p.id === id);
        if (!item) { showMessage("Product not found", "error"); return; }
        await apiFetch(`/shop/products/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            name: item.name,
            description: item.description || "",
            image_url: item.image_url || "",
            product_type: item.product_type,
            price: Number(item.price),
            stock: Number(item.stock) + qty,
            category_id: Number(item.current_category_id),
            is_active: Boolean(item.is_active),
          }),
        }, "shopToken");
        showMessage("Stock updated", "success");
        loadProducts();
      } catch (e) { showMessage(e.message, "error"); }
    }

    async function saveProduct(id) {
      try {
        const payload = {
          name: document.getElementById(`e-name-${id}`).value.trim(),
          description: document.getElementById(`e-description-${id}`).value.trim(),
          image_url: document.getElementById(`e-image-${id}`).value.trim(),
          product_type: document.getElementById(`e-type-${id}`).value,
          price: Number(document.getElementById(`e-price-${id}`).value),
          stock: Number(document.getElementById(`e-stock-${id}`).value),
          category_id: Number(document.getElementById(`e-category-${id}`).value),
          is_active: true,
        };
        if (!payload.name || !payload.category_id || payload.price <= 0 || payload.stock < 0) {
          showMessage("Provide valid details before saving", "error");
          return;
        }
        await apiFetch(`/shop/products/${id}`, {
          method: "PUT",
          body: JSON.stringify(payload),
        }, "shopToken");
        showMessage("Product updated", "success");
        loadProducts();
      } catch (e) { showMessage(e.message, "error"); }
    }

    async function updateStock(id) {
      const stock = Number(document.getElementById(`quick-stock-${id}`).value);
      if (stock < 0 || !Number.isFinite(stock)) {
        showMessage("Enter a valid stock value", "error");
        return;
      }
      try {
        const products = await apiFetch("/shop/products", {}, "shopToken");
        const item = products.find((p) => p.id === id);
        if (!item) { showMessage("Product not found", "error"); return; }
        await apiFetch(`/shop/products/${id}`, {
          method: "PUT",
          body: JSON.stringify({
            name: item.name,
            description: item.description || "",
            image_url: item.image_url || "",
            product_type: item.product_type,
            price: Number(item.price),
            stock,
            category_id: Number(item.current_category_id),
            is_active: Boolean(item.is_active),
          }),
        }, "shopToken");
        showMessage("Stock updated", "success");
        loadProducts();
      } catch (e) { showMessage(e.message, "error"); }
    }

    async function deleteProduct(id) {
      if (!confirm("Remove this product?")) return;
      try {
        await apiFetch(`/shop/products/${id}`, { method: "DELETE" }, "shopToken");
        showMessage("Product removed", "success");
        loadProducts();
      } catch (e) { showMessage(e.message, "error"); }
    }

    loadProducts().catch((e) => showMessage(e.message, "error"));
  </script>
</body>
</html>
