{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}
<div class="auth-card">
  <a href="{% url 'splash' %}" class="link-back">← Back</a>
  <h1 class="h1 mt-md">Welcome back</h1>
  <p class="muted">Login with email or phone</p>
  {% if error %}<p class="alert alert--error">{{ error }}</p>{% endif %}
  <form method="post" action="{% url 'login' %}" class="form-stack mt-lg">
    {% csrf_token %}
    <label class="field">
      <span>Email or phone</span>
      <input class="input" type="text" name="email" autocomplete="username" required placeholder="you@college.edu">
    </label>
    <label class="field">
      <span>Password</span>
      <input class="input" type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="btn btn--primary btn--block">Login</button>
  </form>
  <p class="muted small mt-md center">New here? <a href="{% url 'signup' %}">Sign up</a></p>
</div>
{% endblock %}
