{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}
<div class="auth-card">
  <a href="{% url 'login' %}" class="link-back">← Login</a>
  <h1 class="h1 mt-md">Create your account</h1>
  <p class="muted">Students & staff — one campus wallet.</p>
  {% if error %}<p class="alert alert--error">{{ error }}</p>{% endif %}
  <form method="post" action="{% url 'signup' %}" class="form-stack mt-lg">
    {% csrf_token %}
    <label class="field">
      <span>Email</span>
      <input class="input" type="email" name="email" required placeholder="you@college.edu">
    </label>
    <label class="field">
      <span>Phone (optional)</span>
      <input class="input" type="tel" name="phone" placeholder="10-digit mobile">
    </label>
    <label class="field">
      <span>Password</span>
      <input class="input" type="password" name="password" required minlength="8">
    </label>
    <button type="submit" class="btn btn--primary btn--block">Sign up</button>
  </form>
</div>
{% endblock %}
