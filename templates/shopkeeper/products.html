{% extends "shopkeeper/base_shopkeeper.html" %}
{% load static %}
{% block title %}Products{% endblock %}
{% block sk_content %}
<h1 class="h1">Products</h1>
<p class="muted mt-1">Photos are required — square images look best (1:1)</p>
<div class="card mt-3">
  <h2 class="h2">Add product</h2>
  <form id="sk-product-form" class="form-stack mt-2">
    {% csrf_token %}
    <label class="field"><span>Name</span><input class="input" name="name" required></label>
    <label class="field"><span>Price (₹)</span><input class="input" name="price" type="number" step="0.01" required></label>
    <label class="field"><span>Category</span>
      <select class="input" name="category_id" id="sk-cat"><option value="">—</option></select>
    </label>
    <label class="field"><span>Description</span><textarea class="input" name="description" rows="2"></textarea></label>
    <label class="field image-field"><span>Product image (required)</span>
      <input class="input" type="file" name="image" id="sk-image" accept="image/*" required>
    </label>
    <img id="sk-preview" class="image-preview" alt="" hidden>
    <label class="field row gap-sm"><input type="checkbox" name="is_available" checked> <span>Available</span></label>
    <button type="submit" class="btn btn--primary">Save product</button>
  </form>
</div>
<div class="product-grid mt-3" id="sk-products"></div>
{% endblock %}
{% block extra_js %}<script src="{% static 'js/pages/shopkeeper_products.js' %}"></script>{% endblock %}
